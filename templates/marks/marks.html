{% extends "base.html" %} {% block content %}

<div class="d-flex justify-content-between mb-3">
  <h2>Marks</h2>

  <a href="{{ url_for('marks.add_marks') }}" class="btn btn-primary">
    Add Marks
  </a>
</div>

<table class="table table-striped">
  <thead class="table-dark">
    <tr>
      <th>Student</th>

      <th>Subject</th>

      <th>Marks</th>

      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    {% for mark in marks %}

    <tr>
      <td>{{ mark.student.first_name }} {{ mark.student.last_name }}</td>

      <td>{{ mark.subject.subject_name }}</td>

      <td>{{ mark.marks }}</td>
      <td>
        <a
          href="{{ url_for('marks.edit_marks',
mark_id=mark.id) }}"
          class="btn btn-warning btn-sm"
        >
          Edit
        </a>

        <form
          action="{{ url_for('marks.delete_marks',mark_id=mark.id) }}"
          method="POST"
          style="display: inline"
        >
          <button
            class="btn btn-danger btn-sm"
            onclick="return confirm('Delete these marks?');"
          >
            Delete
          </button>
        </form>
      </td>
    </tr>

    {% endfor %}
  </tbody>
</table>

{% endblock %}
