<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Student Management System</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="d-flex">
      <!-- Sidebar -->

      <div class="sidebar">
        <h4 class="text-center mb-4">🎓 SMS</h4>

        <a
          class="{% if request.endpoint=='main.dashboard' %}active{% endif %}"
          href="{{ url_for('main.dashboard') }}"
        >
          <i class="bi bi-speedometer2"></i>
          Dashboard
        </a>

        <a
          class="{% if request.endpoint=='student.students' %}active{% endif %}"
          href="{{ url_for('student.students') }}"
        >
          <i class="bi bi-people-fill"></i>
          Students
        </a>

        <a
          class="{% if request.endpoint=='subject.subjects' %}active{% endif %}"
          href="{{ url_for('subject.subjects') }}"
        >
          <i class="bi bi-book-fill"></i>
          Subjects
        </a>

        <a
          class="{% if request.endpoint=='marks.view_marks' %}active{% endif %}"
          href="{{ url_for('marks.view_marks') }}"
        >
          <i class="bi bi-pencil-square"></i>
          Marks
        </a>

        <hr />

        <a href="{{ url_for('auth.logout') }}">
          <i class="bi bi-box-arrow-right"></i>
          Logout
        </a>
      </div>

      <!-- Main Content -->

      <div class="content flex-grow-1">
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}

        <div class="alert alert-{{category}} alert-dismissible fade show">
          {{message}}

          <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        {% endfor %} {% endif %} {% endwith %} {% block content %} {% endblock
        %}
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  </body>
</html>
