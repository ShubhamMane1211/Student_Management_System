{% extends "base.html" %} {% block content %}

<form method="GET" class="row mb-3">
  <div class="col-md-8">
    <input
      type="text"
      name="search"
      value="{{ search }}"
      class="form-control"
      placeholder="Search by Roll No, Name, Email or Class"
    />
  </div>

  <div class="col-md-2">
    <button class="btn btn-primary w-100">Search</button>
  </div>

  <div class="col-md-2">
    <a href="{{ url_for('student.students') }}" class="btn btn-secondary w-100">
      Clear
    </a>
  </div>
</form>

<div class="d-flex justify-content-between mb-3">
  <h2>Students</h2>

  <a href="{{ url_for('student.add_student') }}" class="btn btn-primary">
    Add Student
  </a>
</div>

<table class="table table-striped table-hover align-middle">
  <thead class="table-dark">
    <tr>
      <th>Roll No</th>

      <th>Name</th>

      <th>Class</th>

      <th>Email</th>

      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    {% for student in students %}

    <tr>
      <td>{{ student.roll_no }}</td>

      <td>{{ student.first_name }} {{ student.last_name }}</td>

      <td>{{ student.class_name }}</td>

      <td>{{ student.email }}</td>

      <td>
        <a
          href="{{ url_for('student.edit_student',student_id=student.id) }}"
          class="btn btn-warning btn-sm"
        >
          Edit
        </a>
        <form
          action="{{ url_for('student.delete_student',student_id=student.id) }}"
          method="POST"
          style="display: inline"
        >
          <button
            type="submit"
            class="btn btn-danger btn-sm"
            onclick="
              return confirm('Are you sure you want to delete this student?');
            "
          >
            Delete
          </button>
        </form>
        <a
          href="{{ url_for('report.student_report',student_id=student.id) }}"
          class="btn btn-info btn-sm"
          >Report</a
        >
      </td>
    </tr>

    {% endfor %}
  </tbody>
</table>

{% endblock %}
