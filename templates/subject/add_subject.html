{% extends "base.html" %} {% block content %}

<h2>Add Subject</h2>

<form method="POST">
  {{form.hidden_tag()}}

  <div class="mb-3">
    {{form.subject_name.label}} {{form.subject_name(class="form-control")}}
  </div>

  <div class="mb-3">
    {{form.subject_code.label}} {{form.subject_code(class="form-control")}}
  </div>

  {{form.submit(class="btn btn-success")}}
</form>

{% endblock %}
